<script> // Missile Game

// Missile game code

window.addEventListener("DOMContentLoaded", () => {

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreBoard = document.getElementById("score-board");
const ammoBoard = document.getElementById("ammo-board");
const gameOverScreen = document.getElementById("game-over-screen");
const restartBtn = document.getElementById("restartBtn");
const finalScore = document.getElementById("final-score");

let score = 0;
let stage = 1;
let ammo = 12;
let gameOver = false;

/* ---------------- OFFSCREEN BLOOM ---------------- */

const glowCanvas = document.createElement("canvas");
const glowCtx = glowCanvas.getContext("2d");
glowCanvas.width = canvas.width;
glowCanvas.height = canvas.height;

/* ---------------- FX ---------------- */

let screenFlash = 0;
let particles = [];
let trailParticles = [];
let explosions = [];
let enemyMissiles = [];
let playerMissiles = [];
let cities = [];
let battery;

/* ---------------- UI ---------------- */

function updateUI() {
    scoreBoard.innerHTML = `Battle: ${stage}<br>Total Casualties: ${score}<br>Elapsed Time: 00:00:00`;
    ammoBoard.innerHTML = `Thermonuclear ICBMS: ${ammo}`;
}

/* ---------------- TRAILS ---------------- */

class TrailParticle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 0.6;
        this.vy = (Math.random() - 0.5) * 0.6;
        this.life = 25 + Math.random() * 15;
        this.maxLife = this.life;
        this.color = color;
        this.size = 2 + Math.random() * 2;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
    }

    draw(g = ctx) {
        const a = this.life / this.maxLife;
        g.fillStyle = `rgba(${this.color}, ${a})`;
        g.fillRect(this.x, this.y, this.size, this.size);
    }
}

function spawnTrail(x, y, color) {
    trailParticles.push(new TrailParticle(x, y, color));
}

/* ---------------- PARTICLES ---------------- */

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 0.3 + 1; // 4+1 how far particles fly
        this.vx = Math.cos(a) * s;
        this.vy = Math.sin(a) * s;
        this.life = 60 + Math.random() * 40; //60 + Math.random() * 40;
        this.color = color;
    }

    update() {
        this.vx *= 0.96; //0.96
        this.vy *= 0.96; //0.96
        //this.vy += 0.05; // gravity for particles
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
        
    }

    draw(g = ctx) {
        g.fillStyle = this.color;
        g.fillRect(this.x, this.y, 2, 2);
    }
}

function spawnParticles(x, y, color) {
    for (let i = 0; i < 25; i++) {
        particles.push(new Particle(x, y, color));
    }
}

/* ---------------- EXPLOSIONS ---------------- */

class Explosion {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        // controls size of explosion
        this.r = 1; //1
        this.max = 15; //35
        this.alive = true;
        this.flash = true;
        playWav(0);
    }

    update() {
        if (this.flash) {
            screenFlash = 1;
            this.flash = false;
        }

        this.r += 2;
        if (this.r > this.max) this.alive = false;

        if (this.color === "#ffffff") {
            for (let e of enemyMissiles) {
                const d = Math.hypot(e.x - this.x, e.y - this.y);
                if (d < this.r) {
                    e.alive = false;
                    score += 100;
                }
            }
        }

        spawnParticles(this.x, this.y, this.color);
    }

    draw(g = ctx) {
        g.strokeStyle = this.color;
        g.beginPath();
        g.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        g.stroke();
    }
}

/* ---------------- MISSILES ---------------- */

class EnemyMissile {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = 0;

        this.tx = Math.random() * canvas.width;
        this.ty = canvas.height - 20;

        this.vx = (this.tx - this.x) * 0.01;
        this.vy = 2;
        this.gravity = 0.0; //0.05
        this.alive = true;
    }

    update() {
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;

        spawnTrail(this.x, this.y, "255,0,0");

        if (this.y >= this.ty) {
            this.alive = false;
            explosions.push(new Explosion(this.x, this.y, "#ff0033"));
        }
    }

    draw(g = ctx) {
        g.strokeStyle = "red";
        g.beginPath();
        g.moveTo(this.x, this.y);
        g.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
        g.stroke();
    }
}

class PlayerMissile {
    constructor(tx, ty) {
        this.x = battery.x;
        this.y = battery.y;
		this.misslespeed = 1.5;
		
        const dx = tx - this.x;
        const dy = ty - this.y;
        const d = Math.hypot(dx, dy);

        this.vx = (dx / d) * this.misslespeed; 
        this.vy = (dy / d) * this.misslespeed;

        this.tx = tx;
        this.ty = ty;

        this.gravity = 0.00; // 0.08
        this.alive = true;
    }

    update() {
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;

        spawnTrail(this.x, this.y, "255,255,255");

        const d = Math.hypot(this.tx - this.x, this.ty - this.y);
        if (d < 12) {
            this.alive = false;
            explosions.push(new Explosion(this.tx, this.ty, "#ffffff"));
        }
    }

    draw(g = ctx) {
        g.strokeStyle = "#fff";
        g.beginPath();
        g.moveTo(this.x, this.y);
        g.lineTo(this.x - this.vx * 2, this.y - this.vy * 2);
        g.stroke();
    }
}

class City {
	constructor(x, y, color) {
		this.centerX=x;
		this.centerY=y;
		this.size = 3;
		this.alive = true;
	}
	
	update(){
		this.draw();
		
	}
	
	draw() {
		//console.log("Draw City");
		if (!this.alive) return;
		ctx.save();
		ctx.beginPath();  ctx.moveTo(this.centerX, this.centerY - this.size);   
		ctx.lineTo(this.centerX + this.size, this.centerY);   
		ctx.lineTo(this.centerX, this.centerY + this.size);   
		ctx.lineTo(this.centerX - this.size, this.centerY);  
		ctx.closePath();                                                                                         
																													
		// Styling and drawing the shape                                                                             
		ctx.strokeStyle = color;   // The color of the outline                                                  
		ctx.lineWidth = 1;         // Thickness of the line                                                      
		ctx.stroke();             // Draws the outline                                                           
																													
		// Optional: Fill the diamond with a semi-transparent color                                                  
		ctx.fillStyle = 'rgba(0, 120, 0, 0.2)';                                                                
		ctx.fill();       
		ctx.restore();
	}
}



/* ---------------- BLOOM SYSTEM ---------------- */

function drawBloom(drawFn) {
    glowCtx.clearRect(0, 0, glowCanvas.width, glowCanvas.height);

    drawFn(glowCtx);

    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.filter = "blur(7px)"; // 10px
    ctx.globalAlpha = 1; //0.85
    ctx.drawImage(glowCanvas, 0, 0);
	
	if(1){
		ctx.filter = "none";
		ctx.globalAlpha = 1;
		ctx.drawImage(glowCanvas, 0, 0);
    }
    
    ctx.restore();
}

/* ---------------- GAME ---------------- */

function loop() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

	// flash when explosion occurs
	if(1){
		if (screenFlash > 0) {
			ctx.fillStyle = `rgba(255,255,255,${screenFlash})`;
			ctx.fillRect(0, 0, canvas.width, canvas.height);
			screenFlash *= 0.85;
		}
	}

	// filter out entities that do not need to draw
    enemyMissiles = enemyMissiles.filter(m => m.alive);
    playerMissiles = playerMissiles.filter(m => m.alive);
    explosions = explosions.filter(e => e.alive);
    particles = particles.filter(p => p.life > 0);
    trailParticles = trailParticles.filter(p => p.life > 0);

	// update entity 
    enemyMissiles.forEach(m => m.update());
    playerMissiles.forEach(m => m.update());
    explosions.forEach(e => e.update());
	cities.forEach(c => c.update());
    particles.forEach(p => p.update());
    trailParticles.forEach(p => p.update());

	// draw enities with bloom system applied
    drawBloom((g) => {
        explosions.forEach(e => e.draw(g));
        particles.forEach(p => p.draw(g));
        trailParticles.forEach(p => p.draw(g));

        enemyMissiles.forEach(m => m.draw(g));
        playerMissiles.forEach(m => m.draw(g));
    });
	
    requestAnimationFrame(loop);
}

/* ---------------- INPUT ---------------- */

canvas.addEventListener("click", (e) => {
    if (gameOver) return;

    const r = canvas.getBoundingClientRect();
    playerMissiles.push(
        new PlayerMissile(e.clientX - r.left, e.clientY - r.top)
    );
});

/* ---------------- INIT ---------------- */

function reset() {
    score = 0;
    stage = 1;
    ammo = 12;

    enemyMissiles = [];
    playerMissiles = [];
    explosions = [];
    particles = [];
    trailParticles = [];
	
	cities = [];
	for(i=0;i<5;i++){
		X=Math.random() * canvas.width;
		Y=Math.random() * canvas.height;
		color='rgba(255, 255, 255, 1.0)';
		cities.push(
			new City(X, Y, color)
		);
	}
	
    battery = { x: canvas.width / 2, y: canvas.height - 25 };

    updateUI();
}
initAudio();
reset();
loop();

});

</script>
<script> // Terminal display funtions
	// handles terminal processing
	
	const hiddenInput = document.getElementById('hidden-input');
	const visualText = document.getElementById('visual-text');
	const history = document.getElementById('history');
	const container = document.getElementById('terminal-container');

	// Keep the hidden textarea focused so the user can always type
	document.addEventListener('click', () => {
		hiddenInput.focus();
	});

	// Mirror the hidden input text to our visual element
	hiddenInput.addEventListener('input', () => {
		visualText.textContent = hiddenInput.value;
		scrollToBottom();
	});

	// Handle special keys (Enter)
	hiddenInput.addEventListener('keydown', (e) => {
		if (e.key === 'Enter') {
			e.preventDefault(); // Stop default newline in textarea

			const typedText = hiddenInput.value;

			// Create a permanent line in history
			const newLine = document.createElement('div');
			newLine.className = 'line';
			// Include the prompt symbol in history
			newLine.textContent = '> ' + typedText;
			history.appendChild(newLine);
						
			// Reset the input for the next line
			hiddenInput.value = '';
			visualText.textContent = '';

			//check for command
			processCommand(typedText);

			// Ensure the terminal scrolls up if it hits the bottom
			scrollToBottom();
			playKeyclick();
		}else
		{
			playKeyclick();
		}
	});

	// Helper function to handle auto-scrolling
	function scrollToBottom() {
		container.scrollTop = container.scrollHeight;
		//container.scrollTo({ top: textView.scrollHeight, behavior: "smooth"});
		
	}
	
		const textView = document.getElementById("myTextView");
	textView.scrollTo({
	  top: textView.scrollHeight,
	  behavior: "smooth"
});
	
	// command states and events
	// hello-> 
	// 		game playing 
	//			yes
	//				say game playing
	//			no
	//				ask for game
					
	

	// Example function to handle the grabbed text
	function processCommand(command) {
		const trimmedCommand = command.trim().toLowerCase();
		
		
		switch(trimmedCommand){
			case 'help':
				displayResponse('Available commands: help, clear, hello');
				break;
			
			case 'clear':
				document.getElementById('history').innerHTML = '';
				increment.num=0;
				break;
			
			case 'hello':
				displayResponse("Shall we play a game?");
				break;
			
			case 'reset':
				resetGame();
				break;
			case 'c':
				fadeMyControls();
				break;
			case ('goodbye'):
				fadeMyControls();
				fadeTTTGame();
				fadeMap();
				break;
			case ('bye'):
				fadeMyControls();
				fadeTTTGame();
				fadeMap();
				resetGame();
				break;
			case ('yes'):
				fadeMyControls();
				fadeTTTGame();
				fadeMap();
				resetGame();
				break;
							
		}
		
		
	}
	
	function displayResponse(response){
		
				
		if(increment()>9){
			document.getElementById('history').firstElementChild.remove();
			//increment.num=0;
		}
		
		hiddenInput.value = response;
		const typedText = hiddenInput.value;

		// Create a permanent line in history
		const newLine = document.createElement('div');
		newLine.className = 'line';
		// Include the prompt symbol in history
		newLine.textContent = '> ' + typedText;
		history.appendChild(newLine);
					
		// Reset the input for the next line
		hiddenInput.value = '';
		visualText.textContent = '';
		scrollToBottom();
		
	}

	function increment() {
		// Initialize if it doesn't exist yet
		if (typeof increment.num === 'undefined') {
		increment.num = 0; 
		}

		increment.num++;
		return increment.num;
	}
	
	processCommand("help");

	
</script>

<script> // element animations
	
	// element animation functions
	
	function fade(el, fadeIn = true, duration = 1000) {
	  const start = performance.now();

	  if (fadeIn) {
		el.style.display = "block";
	  }

	  const initial = fadeIn ? 0 : 1;
	  const target = fadeIn ? 1 : 0;

	  function tick(now) {
		const progress = Math.min((now - start) / duration, 1);

		// linear interpolation
		const value = initial + (target - initial) * progress;
		el.style.opacity = value;

		if (progress < 1) {
		  requestAnimationFrame(tick);
		} else {
		  // optional cleanup when fading out
		  if (!fadeIn) {
			//el.style.display = "none";
		  }
		}
	  }

	  requestAnimationFrame(tick);
	}

	function slide(el, slideIn = true, duration = 1000) {
	  const start = performance.now();

	  if (slideIn) {
		el.style.display = "block";
	  }

	  const initial = fadeIn ? 0 : 1;
	  const target = fadeIn ? 1 : 0;

	  function tick(now) {
		const progress = Math.min((now - start) / duration, 1);

		// linear interpolation
		const value = initial + (target - initial) * progress;
		el.style.width = value;

		if (progress < 1) {
		  requestAnimationFrame(tick);
		} else {
		  // optional cleanup when fading out
		  if (!fadeIn) {
			el.style.display = "none";
		  }
		}
	  }

	  requestAnimationFrame(tick);
	}
	
	let mapFaded=false;
		
	function fadeMap(){
		mapFaded = mapFaded === true ? false : true;
		fade(document.getElementById('game-container'), mapFaded, 2000);
	}
	
	let gameTTTFaded=false;
	
	function fadeTTTGame(){
		gameTTTFaded = gameTTTFaded === true ? false : true;
		fade(document.getElementById('ticTacToe'), gameTTTFaded, 2000);
	}
	
	let controlsFaded=false;
	
	function fadeMyControls(){
		controlsFaded = controlsFaded === true ? false : true;
		fade(document.getElementById('mycontrols'), controlsFaded, 2000);
	}
	
	
	

</script>

<script> // TicTacToe
	
	// tic Tac Toe game functions
	
	const canvas = document.getElementById('ticTacToe');
	const ctx = canvas.getContext('2d');
	const statusDisplay = document.getElementById('status');
	
	const SIZE = 240;
	const CELL_SIZE = SIZE / 3;
	
	let board = ['', '', '', '', '', '', '', '', ''];
	let currentPlayer = 'X';
	let isGameActive = true;

	// Line width for drawings
	ctx.lineWidth = 6;
	ctx.lineCap = 'round';

	function drawBoard() {
		ctx.clearRect(0, 0, SIZE, SIZE);
		ctx.strokeStyle = '#cccccc';
		
		// Draw vertical lines
		for (let i = 1; i < 3; i++) {
			ctx.beginPath();
			ctx.moveTo(i * CELL_SIZE, 10);
			ctx.lineTo(i * CELL_SIZE, SIZE - 10);
			ctx.stroke();
		}
		
		// Draw horizontal lines
		for (let i = 1; i < 3; i++) {
			ctx.beginPath();
			ctx.moveTo(10, i * CELL_SIZE);
			ctx.lineTo(SIZE - 10, i * CELL_SIZE);
			ctx.stroke();
		}

		// Draw X and O markers based on board state
		for (let i = 0; i < 9; i++) {
			const col = i % 3;
			const row = Math.floor(i / 3);
			const x = col * CELL_SIZE;
			const y = row * CELL_SIZE;

			if (board[i] === 'X') {
				drawX(x, y);
			} else if (board[i] === 'O') {
				drawO(x, y);
			}
		}
	}

	function drawX(x, y) {
		ctx.strokeStyle = '#f4f4f4';
		const offset = 25;
		
		ctx.beginPath();
		ctx.moveTo(x + offset, y + offset);
		ctx.lineTo(x + CELL_SIZE - offset, y + CELL_SIZE - offset);
		ctx.stroke();

		ctx.beginPath();
		ctx.moveTo(x + CELL_SIZE - offset, y + offset);
		ctx.lineTo(x + offset, y + CELL_SIZE - offset);
		ctx.stroke();
	}

	function drawO(x, y) {
		ctx.strokeStyle = '#f4f4f4';
		const centerOffset = CELL_SIZE / 2;
		const radius = CELL_SIZE / 2 - 25;

		ctx.beginPath();
		ctx.arc(x + centerOffset, y + centerOffset, radius, 0, Math.PI * 2);
		ctx.stroke();
	}

	const winningConditions = [
		[0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
		[0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
		[0, 4, 8], [2, 4, 6]             // Diagonals
	];

	function checkResult() {
		let roundWon = false;

		for (let i = 0; i < winningConditions.length; i++) {
			const [a, b, c] = winningConditions[i];
			if (board[a] && board[a] === board[b] && board[a] === board[c]) {
				roundWon = true;
				break;
			}
		}

		if (roundWon) {
			statusDisplay.textContent = `Player ${currentPlayer} Wins!`;
			displayResponse(statusDisplay.textContent);
			isGameActive = false;
			return;
		}

		if (!board.includes('')) {
			statusDisplay.textContent = "It's a Tie!";
			displayResponse(statusDisplay.textContent);
			isGameActive = false;
			return;
		}

		// Switch player
		currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
		statusDisplay.textContent = `Player ${currentPlayer}'s Turn`;
		displayResponse(statusDisplay.textContent);
	}

	canvas.addEventListener('click', function(event) {
		if (!isGameActive) return;

		// Get click coordinates relative to the canvas
		const rect = canvas.getBoundingClientRect();
		const clickX = event.clientX - rect.left;
		const clickY = event.clientY - rect.top;

		// Determine which cell was clicked
		const col = Math.floor(clickX / CELL_SIZE);
		const row = Math.floor(clickY / CELL_SIZE);
		const index = row * 3 + col;

		// If the cell is empty, claim it
		if (board[index] === '') {
			board[index] = currentPlayer;
			if(currentPlayer==='X'){
				playWav(2);
			}else{
				playWav(1);
			}
			drawBoard();
			checkResult();
		}
	});

	function resetGame() {
		board = ['', '', '', '', '', '', '', '', ''];
		currentPlayer = 'X';
		isGameActive = true;
		processCommand('clear');
		statusDisplay.textContent = "Player X's Turn";
		displayResponse(statusDisplay.textContent);
		drawBoard();
	}

	// Initialize the first board draw
	drawBoard();
</script>

</html>
